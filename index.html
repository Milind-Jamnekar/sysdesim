<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sysdesim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="app" data-tab="graph">
    <header class="app-header">
      <h1 class="app-title">sysdesim</h1>
    </header>

    <!-- Tab bar — only visible on mobile -->
    <nav class="mobile-tabs" aria-label="View tabs">
      <button id="tab-graph"  class="tab-btn tab-active" aria-selected="true">Graph</button>
      <button id="tab-charts" class="tab-btn"            aria-selected="false">Charts</button>
    </nav>

    <main class="app-body">
      <!-- Left: topology graph -->
      <section class="graph-panel" aria-label="Topology graph">
        <div id="graph"></div>
        <div class="controls">
          <div class="control-row">
            <button id="btn-kill" class="btn btn-kill" aria-label="Kill Cache">Kill Cache</button>
            <button id="btn-recover" class="btn btn-recover" disabled aria-label="Recover Cache" aria-disabled="true">Recover Cache</button>
          </div>
          <div class="control-row">
            <button id="btn-kill-lb" class="btn btn-kill" aria-label="Kill LB">Kill LB</button>
            <button id="btn-recover-lb" class="btn btn-recover" disabled aria-label="Recover LB" aria-disabled="true">Recover LB</button>
          </div>
          <div class="control-row">
            <button id="btn-kill-app-a" class="btn btn-kill" aria-label="Kill App A">Kill App A</button>
            <button id="btn-kill-app-b" class="btn btn-kill" aria-label="Kill App B">Kill App B</button>
            <button id="btn-recover-apps" class="btn btn-recover" disabled aria-label="Recover App Servers" aria-disabled="true">Recover Apps</button>
          </div>
        </div>
        <div class="load-control">
          <label class="load-label" for="load-slider">
            Load: <span id="load-value">1000</span> req/s
          </label>
          <input
            type="range"
            id="load-slider"
            class="load-slider"
            min="100"
            max="2000"
            value="1000"
            step="50"
            aria-label="Baseline load in requests per second"
          />
        </div>
        <p class="hint">Start here — kill the cache and watch the cascade.</p>
      </section>

      <!-- Right: metric charts -->
      <section class="charts-panel" id="charts" aria-label="Metric charts" aria-hidden="true"></section>
    </main>

    <footer class="timeline-bar" aria-label="Playback timeline">
      <button id="btn-playpause" class="btn btn-timeline" aria-label="Pause simulation">⏸</button>
      <div class="timeline-track">
        <input
          type="range"
          id="timeline-slider"
          class="timeline-slider"
          min="0"
          max="0"
          value="0"
          step="1"
          aria-label="Scrub through recorded history"
        />
      </div>
      <span id="timeline-time" class="timeline-time">live</span>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
